name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Adds a button to manually trigger the build

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x android/NoiseDetector/gradlew

    - name: Build Debug APK
      working-directory: ./android/NoiseDetector
      run: ./gradlew assembleDebug

    - name: Upload APK to Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "Latest Android Build"
        body: "Download the `app-debug.apk` below to install the IoT Noise Monitor on your Android device."
        files: android/NoiseDetector/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
